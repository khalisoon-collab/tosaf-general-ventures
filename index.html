<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#0b0f19;
color:#fff;
line-height:1.6;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

header{
background:#05070d;
padding:20px 0;
position:sticky;
top:0;
z-index:1000;
}

.logo h1{
color:#d4af37;
font-size:2.5rem;
}

.logo span{
color:#ccc;
}

nav{
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
margin-right:20px;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#d4af37;
}

.hero{
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
padding:180px 20px;
text-align:center;
}

.hero h1{
font-size:3.5rem;
margin-bottom:15px;
}

.hero p{
font-size:1.2rem;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:25px;
background:#d4af37;
color:#05070d;
padding:15px 35px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:white;
}

section{
padding:80px 0;
}

.features{
background:#111827;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1b2333;
padding:30px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
color:#d4af37;
margin-bottom:10px;
}

#about,
#contact{
background:#0b0f19;
}

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
z-index:1000;
}

.whatsapp-float img{
width:38px;
}

footer{
background:#05070d;
text-align:center;
padding:40px;
color:#888;
}
</style>
